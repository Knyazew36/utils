stages:
  - publish

publish:npm:
  stage: publish
  image: node:22
  rules:
    # Аналог GitHub Actions: on.push.tags: ["v*"]
    - if: '$CI_COMMIT_TAG =~ /^v.*/'
      when: on_success
    - when: never
  script:
    - node --version
    - npm --version
    # Настраиваем токен для npmjs registry (токен хранится в GitLab CI/CD Variables как NPM_TOKEN)
    - npm config set registry "https://registry.npmjs.org"
    - npm config set "//registry.npmjs.org/:_authToken" "${NPM_TOKEN}"
    - npm publish

